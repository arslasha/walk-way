services:
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: walkway_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ./backend
    image: walkway-backend:latest
    container_name: walkway_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      target: dev
    image: walkway-frontend:latest
    container_name: walkway_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
    depends_on:
      - web

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1300

volumes:
  postgres_data:

